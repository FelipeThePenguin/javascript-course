<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  
  <title></title>
</head>

<body>
  
  <script>
   function convertLength(length, from, to) {
    let result = '';
    
    if (from === to) {
      result = `${length} ${from}`;
    }
    
    else if (from === 'km' && to === 'miles') {
      result = `${length / 1.6} ${to}`;
    }
    
    else if (from === 'miles' && to === 'km') {
      result = `${length * 1.6} ${to}`;
    }
    
    else if (from === 'km' && to === 'ft') {
      result = `${length * 3281} ${to}`;
    }
    
    else if (from === 'miles' && to === 'ft') {
      result = `${length * 5280} ${to}`;
    }
    
    else if (from === 'ft' && to === 'km') {
      result = `${length / 3281} ${to}`;
    }
    
    else if (from === 'ft' && to === 'miles') {
      result = `${length / 5280} ${to}`;
    }
    return result;
  }
  
  console.log(convertLength(5, 'miles', 'km'));
  console.log(convertLength(5, 'miles', 'ft'));
  console.log(convertLength(5, 'km', 'ft'));
  </script>
</body>

</html>
