    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

<body>

<script>
 function removeEgg(foods) {
   let eggsRemoved = 0;
   return foods.filter(value => {
   if (value === 'egg' && eggsRemoved < 2) {
     eggsRemoved++;
     return false;
   }
   return true;
 });
 
 }
 
 console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
</script>
  
</body>
