<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</head>

<body>
  
<button onclick="messages++">
 Add
</button>

<button onclick="messages--">
  Remove
</button>

<script>
 let messages = 2;

 setInterval(() => {
     document.title = `(${messages}) New Messages`;
   }, 1000
 );
</script>
  
</body>

</html>
