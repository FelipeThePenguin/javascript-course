<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    
    <link rel="stylesheet" href="/javascript-course-exercises/Lesson 12/12s/12s.css">
    
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>

  <script>eruda.init();</script>
  <!--Loads Eruda Console-->
    
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button class="move-button js-rock-button">
      <img src="/images/rock-emoji.png" class="move-icon">
      
      </button>

    <button class="move-button js-paper-button">
      <img src="/images/paper-emoji.png" class="move-icon">
    </button>

    <button class="move-button js-scissors-button">
      <img src="/images/scissors-emoji.png" class="move-icon">
    </button>
    
    <p class="js-result result"></p>
    
    <p class="js-moves">
    </p>
    
    <p class="js-score score"></p>
    
    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">
      Reset Score
    </button>
    
    <button class="auto-play-button js-auto-play-button">Auto Play</button>

    <script src="/javascript-course-exercises/Lesson 12/12s/12s.js"></script>
  </body>
</html>
