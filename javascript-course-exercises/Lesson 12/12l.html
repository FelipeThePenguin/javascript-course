    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

<body>

<script>
function countPositive(nums) {
  let resultNumber = 0;
  
  nums.forEach(
    function (value) {
      if (value >= 0) {
        resultNumber++;
      }
    }
  );
  
  return resultNumber;
}

console.log(countPositive([1, -3, 5]));
console.log(countPositive([-2, 3, -5, 7, 10]));
</script>
  
</body>
