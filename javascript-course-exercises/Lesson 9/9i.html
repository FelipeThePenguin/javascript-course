<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart Qunatity</title>
  
 <style>

 </style>
 <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <!--Loads Eruda Console-->
</head>

  <body>
    <button onclick="
    console.log(`Cart quantity: ${cartQuantity}`);
    ">Show Quantity</button>
    
    <button onclick="
     updateCartQuantity('+', '1');
    ">Add to Cart</button>
    
    <button onclick="
    updateCartQuantity('+', '2'); ">+2</button>
    
    <button onclick="
    updateCartQuantity('+', '3');">+3</button>
    
    <button onclick="
    updateCartQuantity('+', '4');">+4</button>
    
    <button onclick="
    updateCartQuantity('+', '5');">+5</button>
    
    <button onclick="
    updateCartQuantity('-', '1');">Remove from cart</button>
    
    <button onclick="
    updateCartQuantity('-', '2');">-2</button>
    
    <button onclick="
    updateCartQuantity('-', '3');">-3</button>
    
    <button onclick="
    cartQuantity = 0;
    console.log('Cart was reset.');
    console.log(`Cart quantity: ${cartQuantity}`);
 ">Reset Cart</button>

 
 <p class="js-cart-quantity"></p>
    
    <script>
      let cartQuantity = 0;
      
      document.querySelector('.js-cart-quantity').innerHTML = `Cart quantity: ${cartQuantity}`;
      
      function updateCartQuantity(sign, number) {
        cartQuantity = eval(`${cartQuantity}${sign}${number}`);
        
        if (cartQuantity < 0) {
          alert('Not enough items in the cart!');
          cartQuantity = eval(`${cartQuantity}+${number}`);
          return;
          }
          
        if (cartQuantity > 10) {
        alert('The cart is full!');
        cartQuantity = eval(`${cartQuantity}-${number}`);
        return;
      }
      
      document.querySelector('.js-cart-quantity').innerHTML = `Cart quantity: ${cartQuantity}`;
      }
      
    </script>
  </body>
  
</html>
