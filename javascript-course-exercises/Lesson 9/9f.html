<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  
  <title></title>
</head>

<body>

  <input placeholder="Name" class="js-input" onkeydown="showResult(event)">
  <button onclick="displayName()">Submit</button>
  <p class="js-display-name"></p>
  
  <script>
   function showResult(event) {
    if (event.key === 'Enter') {
      displayName() }
  }
  
   function displayName() {
     const inputValue = document.querySelector('.js-input').value;
     
     document.querySelector('.js-display-name').innerHTML = `Your name is: ${inputValue}`;
   }
   
  </script>
</body>

</html>
