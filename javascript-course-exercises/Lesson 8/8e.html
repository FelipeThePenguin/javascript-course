<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  
  <title></title>
</head>

<body>
  
  <script>
  const product = {
  name: 'basketball',
  price: 2095
};

const product1 = {
  name: 'socks',
  price: 1450
};
  
  function comparePrice(product1, product2) {
  return product1.price < product.price ? product1 : product;
  }
  
  function isSameProduct(product1, product2) {
    
    if ((product1.name === product2.name) && (product1.price === product2.price)) {
    return true
    }
    return false
    
  }
  
  console.log(isSameProduct(product, product1));
  
  console.log(comparePrice(product, product1));
  
  console.log(product);
  
  product.price += 500;
  
  console.log(product);
  
  product['delivery-time'] = '3 days';
  
  console.log(product);
  </script>
</body>

</html>
