<html>

<head>

<body>
  
  <button onclick="playGame('heads');">heads</button>
  <button onclick="playGame('tails');">tails</button>
  
  <script>
  
  const score = JSON.parse(localStorage.getItem('score')) || {
    wins: 0,
    losses: 0
  };
  
  function playGame(guess) {
   let randomNumber = Math.random();
   let result = '';
   
   let guessPlayer = guess;
   // Inside the strings, put heads or tails
   
   result = (randomNumber < 0.5) ? 'heads' : 'tails';
   
   
   const matchResult = (result === guessPlayer) ? 'You win!' : 'You Lose!';
   
   const addResult = (result === guessPlayer) ? score.wins += 1 : score.losses += 1;
   
   localStorage.setItem('score', JSON.stringify(score));

console.log(`Computer: ${result}, Player: ${guessPlayer}
${matchResult}
Wins: ${score.wins}, Losses: ${score.losses}`);
  }
  
  </script>
</body>
