<script>
  console.log('11c');
function arraySwap(array) {
  const firstItem = array[0];
  const lastItem = array[array.length-1];
  
  array[0] = lastItem;
  array[array.length-1] = firstItem;
  
  console.log(array);
}

arraySwap([1,20,22,24,5]);
arraySwap(['hi', 'hello', 'good']);
</script>
