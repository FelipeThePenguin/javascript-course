<script>
console.log('11s');

function removeEgg(foods) {
  let result = [];
  let limit = 0;
  
  for (let i = 0; i < foods.length; i++) {
    if (limit >= 2) {
      result.push(foods[i]);
      continue;
    }
    if (foods[i] === 'egg') {
      limit++
      continue;
    } 
    result.push(foods[i]);
  }
  
  console.log(result);
}

removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']);

</script>
