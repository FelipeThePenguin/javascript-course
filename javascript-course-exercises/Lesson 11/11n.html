<script>
console.log('11n');
function countWords(words) {
  let wordCount = {};
  
  for (let i=0; i < words.length; i++) {
    const string = words[i];
    
    if (!wordCount[string]) {
      wordCount[string] = 1;
    }
    else {
      wordCount[string]++;
    }
  }
  return wordCount;
}
 
console.log(countWords(['apple', 'grape', 'apple', 'apple']));
 
</script>
