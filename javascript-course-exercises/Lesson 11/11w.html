<script>
console.log('11w');

function findIndex(array, word) {
  let result = -1;
  
  for (let i = 0; i < array.length; i++) {
   if (array[i] === word) {
     result = i;
     break;
   }
  }
  
  return result
}

function unique(array) {
  let result = [];
  
  for (let i = 0; i < array.length; i++) {
    if (findIndex(result, array[i]) !== -1) {
      continue;
    }
    result.push(array[i]);
  }
  
  return result;

}

console.log(unique(['red', 'green', 'green', 'red']));
