<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart Qunatity</title>
  
 <style>

 </style>
 <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <!--Loads Eruda Console-->
</head>

  <body>
    <button onclick="
    console.log(`Cart quantity: ${cartQuantity}`);
    ">Show Quantity</button>
    
    <button onclick="
     cartQuantity++;
     
     if (cartQuantity > 10) {
      alert('The cart is full!');
      cartQuantity--;
      }
     
     console.log(`Cart quantity: ${cartQuantity}`);
    ">Add to Cart</button>
    
    <button onclick="
    cartQuantity += 2;
    
    if (cartQuantity > 10) {
      alert('The cart is full!');
      cartQuantity -= 2;
      }
    
     console.log(`Cart quantity: ${cartQuantity}`);
    ">+2</button>
    
    <button onclick="
    cartQuantity += 3;
    
    if (cartQuantity > 10) {
      alert('The cart is full!');
      cartQuantity -= 3;
      }
    
     console.log(`Cart quantity: ${cartQuantity}`);
    ">+3</button>
    
    <button onclick="
    cartQuantity += 4;
    
    if (cartQuantity > 10) {
      alert('The cart is full!');
      cartQuantity -= 4;
      }
    
    console.log(`Cart quantity: ${cartQuantity}`);
    ">+4</button>
    
    <button onclick="
    cartQuantity += 5;
    
    if (cartQuantity > 10) {
      alert('The cart is full!');
      cartQuantity -= 5;
      }
    
    console.log(`Cart quantity: ${cartQuantity}`);
    ">+5</button>
    
    <button onclick="
     cartQuantity--;
     console.log(`Cart quantity: ${cartQuantity}`);
    ">Remove from cart</button>
    
    <button onclick="
    cartQuantity -= 2;
    console.log(`Cart quantity: ${cartQuantity}`);
    ">-2</button>
    
    <button onclick="
    cartQuantity -= 3;
    console.log(`Cart quantity: ${cartQuantity}`);
    ">-3</button>
    
    <button onclick="
    cartQuantity = 0;
    console.log('Cart was reset.');
    console.log(`Cart quantity: ${cartQuantity}`);
 ">Reset Cart</button>
    
    <script>
      let cartQuantity = 0;
    </script>
  </body>

</html>
