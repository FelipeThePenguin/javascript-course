<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  
  <title></title>
</head>

<body>
  
  <script>
   let randomNumber = Math.random();
   let result = '';
   
   let guess = 'tails';
   // Inside the strings, put heads or tails
   
   if (randomNumber < 0.5) {
     result = 'heads';
   }
   
   else {
     result = 'tails';
   }
   
   if (result === guess) {
     console.log('You win!');
   }
   
   else {
     console.log('You lose!')
   }
   
  </script>
</body>

</html>
